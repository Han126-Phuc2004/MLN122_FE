<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MLN122 – Ôn tập FE (526 câu)</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <!-- Top bar -->
    <header class="topbar">
      <div class="brand">
        <span class="brand-code">MLN122</span>
        <span class="brand-sub">Ôn tập FE · 526 câu</span>
      </div>
      <div class="top-actions">
        <button type="button" class="btn ghost" id="btnMode" title="Đổi chế độ">Lần lượt</button>
        <button type="button" class="btn ghost" id="btnShuffle" title="Xáo trộn">🔀</button>
        <button type="button" class="btn ghost" id="btnReset" title="Xóa tiến độ">↺</button>
      </div>
    </header>

    <!-- Stats -->
    <section class="stats" id="stats">
      <div class="stat"><span class="stat-n" id="statDone">0</span><span class="stat-l">Đã làm</span></div>
      <div class="stat ok"><span class="stat-n" id="statOk">0</span><span class="stat-l">Đúng</span></div>
      <div class="stat bad"><span class="stat-n" id="statBad">0</span><span class="stat-l">Sai</span></div>
      <div class="stat"><span class="stat-n" id="statLeft">526</span><span class="stat-l">Còn lại</span></div>
      <div class="progress-wrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </section>

    <!-- Jump / filter -->
    <section class="toolbar">
      <label class="jump">
        Câu
        <input type="number" id="jumpInput" min="1" max="526" value="1" />
        <button type="button" class="btn small" id="btnJump">Đi</button>
      </label>
      <div class="filters">
        <button type="button" class="chip active" data-filter="all">Tất cả</button>
        <button type="button" class="chip" data-filter="wrong">Sai</button>
        <button type="button" class="chip" data-filter="unseen">Chưa làm</button>
        <button type="button" class="chip" data-filter="star">★ Đánh dấu</button>
      </div>
    </section>

    <!-- Exam card (matches image format) -->
    <main class="stage">
      <article class="exam-card" id="examCard">
        <div class="card-header">
          <span class="card-code" id="cardCode">MLN122_SP26_B5FE</span>
          <span class="card-sep">|</span>
          <span class="card-qnum" id="cardQnum">Multiple Choice Question 1</span>
        </div>

        <p class="card-choose" id="cardChoose">(Choose 1 answer)</p>

        <h1 class="card-question" id="cardQuestion">Đang tải…</h1>

        <div class="card-options" id="cardOptions"></div>

        <div class="card-feedback" id="cardFeedback" hidden></div>
        <div class="card-note" id="cardNote" hidden></div>
        <div class="card-alt" id="cardAlt" hidden></div>

        <div class="fe-mark" aria-hidden="true">FE</div>
      </article>
    </main>

    <!-- Controls -->
    <footer class="controls">
      <button type="button" class="btn" id="btnPrev">← Trước</button>
      <button type="button" class="btn" id="btnStar" title="Đánh dấu">☆</button>
      <button type="button" class="btn" id="btnCheck" hidden aria-hidden="true">Kiểm tra</button>
      <button type="button" class="btn" id="btnReveal" title="Xem đáp án">Hiện ĐA</button>
      <button type="button" class="btn primary" id="btnNext">Tiếp →</button>
    </footer>

    <p class="hint">
      Chọn đáp án là hiện đúng/sai ngay · Phím: <kbd>A</kbd>–<kbd>E</kbd> ·
      <kbd>Enter</kbd>/<kbd>→</kbd> tiếp · <kbd>←</kbd> trước · <kbd>H</kbd> hiện ĐA · <kbd>S</kbd> đánh dấu
    </p>
  </div>

  <script src="app.js"></script>
</body>
</html>
