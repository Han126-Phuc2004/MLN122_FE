<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ôn tập FE – MLN122 · PRM393 · JFE301 · JIT401</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta name="color-scheme" content="light dark" />
  <script>
    /* Apply theme before paint to avoid flash */
    (function () {
      try {
        var k = "fe_learn_theme_v1";
        var t = localStorage.getItem(k);
        if (t !== "light" && t !== "dark") {
          t = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
        }
        if (t === "dark") document.documentElement.classList.add("dark");
        else document.documentElement.classList.remove("dark");
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="style.css?v=20260721d" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <span class="brand-code" id="brandCode">FE Ôn tập</span>
        <span class="brand-sub" id="brandSub">—</span>
      </div>
      <nav class="subjects" id="subjects" aria-label="Chọn môn">
        <button type="button" class="sub-tab active" data-subject="mln122">MLN122</button>
        <button type="button" class="sub-tab" data-subject="prm393">PRM393</button>
        <button type="button" class="sub-tab" data-subject="jfe301">JFE301</button>
        <button type="button" class="sub-tab" data-subject="jit401">JIT401</button>
      </nav>
      <div class="top-actions">
        <button type="button" class="btn ghost" id="btnTheme" title="Sáng / Tối" aria-label="Đổi giao diện sáng tối">🌙</button>
        <button type="button" class="btn ghost" id="btnSync" title="Đồng bộ">☁</button>
        <button type="button" class="btn ghost" id="btnMode" title="Chế độ">Lần lượt</button>
        <button type="button" class="btn ghost" id="btnShuffle" title="Xáo trộn">🔀</button>
        <button type="button" class="btn ghost" id="btnReset" title="Reset">↺</button>
      </div>
    </header>

    <div class="workspace">
      <main class="main-col">
        <div class="toolbar-simple">
          <div class="stats-inline" id="stats">
            <span><b id="statDone">0</b> đã làm</span>
            <span class="ok"><b id="statOk">0</b> đúng</span>
            <span class="bad"><b id="statBad">0</b> sai</span>
            <span><b id="statLeft">0</b> còn</span>
            <div class="progress-wrap">
              <div class="progress-bar" id="progressBar"></div>
            </div>
          </div>
          <div class="toolbar-right">
            <label class="jump">
              Câu
              <input type="number" id="jumpInput" min="1" max="9999" value="1" />
              <button type="button" class="btn small" id="btnJump">Đi</button>
            </label>
            <div class="filters">
              <button type="button" class="chip active" data-filter="all">Tất cả</button>
              <button type="button" class="chip" data-filter="wrong">Sai</button>
              <button type="button" class="chip" data-filter="unseen">Chưa</button>
              <button type="button" class="chip" data-filter="star">★</button>
            </div>
            <div class="filters source-filters" id="sourceFilters" hidden>
              <button type="button" class="chip active" data-source="all">Tất cả</button>
              <button type="button" class="chip" data-source="exam">Đề FE</button>
              <button type="button" class="chip" data-source="slides">Ôn thêm</button>
            </div>
          </div>
        </div>

        <article class="exam-card" id="examCard">
          <div class="card-header">
            <span class="card-code" id="cardCode">—</span>
            <span class="card-sep">|</span>
            <span class="card-qnum" id="cardQnum">—</span>
            <span class="card-pos" id="sideMeta"></span>
          </div>
          <p class="card-choose" id="cardChoose"></p>
          <h1 class="card-question" id="cardQuestion">Đang tải…</h1>
          <div class="card-options" id="cardOptions"></div>
          <div class="card-feedback" id="cardFeedback" hidden></div>
          <div class="card-explain" id="cardExplain" hidden></div>
          <div class="card-note" id="cardNote" hidden></div>
          <div class="card-alt" id="cardAlt" hidden></div>
        </article>

        <footer class="controls">
          <button type="button" class="btn" id="btnPrev">← Trước</button>
          <button type="button" class="btn" id="btnStar" title="Đánh dấu">☆</button>
          <button type="button" class="btn" id="btnCheck" hidden aria-hidden="true">Kiểm tra</button>
          <button type="button" class="btn" id="btnReveal">Hiện ĐA</button>
          <button type="button" class="btn primary" id="btnNext">Tiếp →</button>
        </footer>
      </main>

      <aside class="side-map" aria-label="Bản đồ câu">
        <div class="map-head">
          <span>Bản đồ</span>
          <span class="map-count"><span id="mapCount">0</span> câu</span>
        </div>
        <div class="map-legend">
          <span><i class="dot current"></i> đang làm</span>
          <span><i class="dot ok"></i> đúng</span>
          <span><i class="dot bad"></i> sai</span>
          <span><i class="dot unseen"></i> chưa</span>
        </div>
        <div class="q-map" id="qMap" role="list"></div>
      </aside>
    </div>
  </div>

  <div class="modal-backdrop" id="syncModal" hidden>
    <div class="modal" role="dialog" aria-labelledby="syncTitle">
      <header class="modal-head">
        <h2 id="syncTitle">Đồng bộ</h2>
        <button type="button" class="btn ghost" id="btnSyncClose">✕</button>
      </header>
      <p class="modal-lead"><strong>Offline (khuyên dùng):</strong> «Copy tiến độ» tạo mã <code>F2:</code> đã nén — ngắn, dán máy kia. Cloud free hay 429.</p>
      <div class="sync-actions">
        <button type="button" class="btn primary" id="btnSyncCopyProgress">Copy tiến độ</button>
        <button type="button" class="btn" id="btnSyncPasteProgress">Dán tiến độ</button>
      </div>
      <label class="sync-field">
        Dán mã nén tại đây (máy nhận)
        <textarea id="syncPasteBox" rows="2" placeholder="F2:… (mã nén ngắn) hoặc JSON" spellcheck="false"></textarea>
      </label>
      <p class="sync-status" id="syncStatus">Chưa kết nối.</p>
      <hr class="modal-hr" />
      <p class="modal-lead" style="margin:0 0 0.5rem">Cloud (hay lỗi 429) — tùy chọn</p>
      <label class="sync-field">
        Mã
        <div class="sync-row">
          <input type="text" id="syncCodeInput" placeholder="Mã đồng bộ cloud" autocomplete="off" spellcheck="false" />
          <button type="button" class="btn small" id="btnSyncCopy">Copy</button>
        </div>
      </label>
      <div class="sync-actions">
        <button type="button" class="btn" id="btnSyncCreate">Tạo mã</button>
        <button type="button" class="btn" id="btnSyncPush">Đẩy lên</button>
        <button type="button" class="btn" id="btnSyncPull">Kéo về</button>
      </div>
      <label class="sync-check">
        <input type="checkbox" id="syncAuto" />
        Tự đồng bộ cloud (không khuyến nghị)
      </label>
      <div class="sync-link-box" id="syncLinkBox" hidden>
        <a id="syncLink" href="#" target="_blank" rel="noopener"></a>
        <button type="button" class="btn small" id="btnSyncCopyLink">Copy link</button>
      </div>
      <hr class="modal-hr" />
      <div class="sync-actions">
        <button type="button" class="btn small" id="btnSyncExport">Xuất JSON</button>
        <button type="button" class="btn small" id="btnSyncImport">Nhập JSON</button>
        <input type="file" id="syncImportFile" accept="application/json,.json" hidden />
      </div>
    </div>
  </div>

  <script src="app.js?v=20260722d"></script>
</body>
</html>
